<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>පොරොන්දම් ගැලපීම - දෛවය</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="porondam.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="sticky-header">
        <div class="header-content">
            <div class="header-left">
                <button id="menu-toggle" class="menu-toggle-btn">
                    <span></span><span></span><span></span>
                </button>
                <div class="logo"><a href="../index.html" class="logo-link">දෛවය</a></div>
            </div>
            <nav class="header-nav" id="auth-buttons">
                <button id="login-btn" class="header-button">Login</button>
                <button id="signup-btn" class="header-button">Sign Up</button>
            </nav>
            <div class="header-nav" id="user-display" style="display: none;">
                <span id="user-identifier-header"></span>
                <button id="logout-btn-header" class="header-button">Logout</button>
            </div>
        </div>
    </header>

    <nav id="offcanvas-menu" class="offcanvas-menu">
        <ul>
            <li><a href="../index.html">මුල් පිටුව</a></li>
            <li><a href="../porondam.html">පොරොන්දම්</a></li>
            <li><a href="../combined-reading/coming-soon.html">ඒකාබද්ධ පලාපල</a></li>
            <li><a href="../account/account.html">මගේ ගිණුම</a></li>
            <li><a href="#">අප ගැන</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="main-title-section">
            <h1 class="app-title">පොරොන්දම් ගැලපීම</h1>
            <p class="subtitle">දෙදෙනෙකු අතර ජ්‍යෝතිෂ ගැළපීම් පරීක්ෂා කරන්න</p>
        </div>

        <div id="message-container"></div>

        <section class="form-section">
            <form id="porondam-form">
                <div class="form-grid">
                    <div class="form-person-column">
                        <h3 class="person-title">පළමු පුද්ගලයා (උදා: මනාලිය)</h3>
                        <div class="input-group">
                            <label for="p1-birth-date">ජන්ම දිනය:</label>
                            <input type="date" id="p1-birth-date" required>
                        </div>
                        <div class="input-group">
                            <label for="p1-birth-time">ජන්ම වේලාව:</label>
                            <input type="time" id="p1-birth-time" required>
                        </div>
                        <div class="input-group">
                            <label for="p1-birth-place">ජන්ම ස්ථානය:</label>
                            <input type="text" id="p1-birth-place" placeholder="උදා: කොළඹ, ශ්‍රී ලංකාව" required>
                        </div>
                    </div>
                    <div class="form-person-column">
                        <h3 class="person-title">දෙවන පුද්ගලයා (උදා: මනාලයා)</h3>
                        <div class="input-group">
                            <label for="p2-birth-date">ජන්ම දිනය:</label>
                            <input type="date" id="p2-birth-date" required>
                        </div>
                        <div class="input-group">
                            <label for="p2-birth-time">ජන්ම වේලාව:</label>
                            <input type="time" id="p2-birth-time" required>
                        </div>
                        <div class="input-group">
                            <label for="p2-birth-place">ජන්ම ස්ථානය:</label>
                            <input type="text" id="p2-birth-place" placeholder="උදා: මහනුවර, ශ්‍රී ලංකාව" required>
                        </div>
                    </div>
                </div>
                <div class="button-container">
                    <button type="submit" id="check-compatibility-btn" class="submit-btn">
                        ගැළපීම් පරීක්ෂා කරන්න
                    </button>
                </div>
            </form>
        </section>

        <div id="results-container"></div>
    </div>

    <footer class="footer">
        <p>© 2025 දෛවය</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="porondam.js"></script>
</body>
</html>
